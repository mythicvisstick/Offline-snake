<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Minecraft</title>

<style>
body{
margin:0;
overflow:hidden;
background:#87CEEB;
font-family:sans-serif;
}

canvas{
display:block;
}

#controls{
position:fixed;
bottom:20px;
left:20px;
}

#controls button{
width:70px;
height:70px;
font-size:22px;
margin:4px;
border-radius:10px;
border:none;
background:#333;
color:white;
}

#actions{
position:fixed;
bottom:20px;
right:20px;
display:flex;
flex-direction:column;
}

#actions button{
width:80px;
height:80px;
margin:5px;
font-size:20px;
border-radius:10px;
border:none;
background:#444;
color:white;
}

#inventory{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
}

.slot{
width:60px;
height:60px;
background:#555;
border:3px solid #333;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
}

.selected{
border:3px solid yellow;
}
</style>

</head>
<body>

<canvas id="game"></canvas>

<div id="inventory"></div>

<div id="controls">
<div style="text-align:center">
<button id="up">▲</button>
</div>
<div>
<button id="left">◀</button>
<button id="down">▼</button>
<button id="right">▶</button>
</div>
</div>

<div id="actions">
<button id="mine">⛏</button>
<button id="place">🧱</button>
</div>

<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const size=40

let player={x:5,y:5}

let world=[]
let width=40
let height=20

for(let y=0;y<height;y++){
world[y]=[]
for(let x=0;x<width;x++){
if(y>12) world[y][x]=1
else world[y][x]=0
}
}

let inventory=[0,0,0]
let selected=0

const inventoryDiv=document.getElementById("inventory")

function updateInventory(){
inventoryDiv.innerHTML=""
inventory.forEach((count,i)=>{
let slot=document.createElement("div")
slot.className="slot"+(i===selected?" selected":"")
slot.innerText=count
slot.onclick=()=>{selected=i;updateInventory()}
inventoryDiv.appendChild(slot)
})
}

updateInventory()

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let y=0;y<height;y++){
for(let x=0;x<width;x++){

if(world[y][x]==1){
ctx.fillStyle="#8B5A2B"
ctx.fillRect(x*size,y*size,size,size)
}

if(world[y][x]==2){
ctx.fillStyle="gray"
ctx.fillRect(x*size,y*size,size,size)
}

ctx.strokeRect(x*size,y*size,size,size)

}
}

ctx.fillStyle="red"
ctx.fillRect(player.x*size,player.y*size,size,size)

}

function move(dx,dy){

let nx=player.x+dx
let ny=player.y+dy

if(nx>=0 && ny>=0 && nx<width && ny<height){
player.x=nx
player.y=ny
}

}

function mine(){

let block=world[player.y][player.x]

if(block!=0){
inventory[selected]++
world[player.y][player.x]=0
updateInventory()
}

}

function place(){

if(inventory[selected]>0 && world[player.y][player.x]==0){
world[player.y][player.x]=1
inventory[selected]--
updateInventory()
}

}

document.getElementById("up").ontouchstart=()=>move(0,-1)
document.getElementById("down").ontouchstart=()=>move(0,1)
document.getElementById("left").ontouchstart=()=>move(-1,0)
document.getElementById("right").ontouchstart=()=>move(1,0)

document.getElementById("mine").ontouchstart=mine
document.getElementById("place").ontouchstart=place

document.getElementById("up").onclick=()=>move(0,-1)
document.getElementById("down").onclick=()=>move(0,1)
document.getElementById("left").onclick=()=>move(-1,0)
document.getElementById("right").onclick=()=>move(1,0)

document.getElementById("mine").onclick=mine
document.getElementById("place").onclick=place

function gameLoop(){
draw()
requestAnimationFrame(gameLoop)
}

gameLoop()
</script>

</body>
</html>
